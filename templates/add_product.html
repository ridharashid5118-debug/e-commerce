{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#eef2f7;
        }

        .container{
            width:500px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#111827;
        }

        input,
        textarea{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #d1d5db;
            border-radius:10px;
            font-size:15px;
        }

        textarea{
            height:120px;
            resize:none;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#2563eb;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Add Product</h1>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <input
                type="text"
                name="name"
                placeholder="Product Name"
                required>

            <textarea
                name="description"
                placeholder="Product Description"
                required></textarea>

            <input
                type="number"
                name="price"
                placeholder="Price"
                required>

            <input
                type="number"
                name="stock"
                placeholder="Stock Quantity"
                required>

            <input
                type="file"
                name="image"
                required>

            <button type="submit">
                Add Product
            </button>

        </form>

        <a href="{% url 'home' %}" class="back">
            ← Back to Home
        </a>

    </div>

</body>
</html>

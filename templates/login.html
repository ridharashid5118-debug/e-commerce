{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSEN Login</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
     <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background-color: white;
            padding:20px;
        }

        .login-container{
            width:950px;
            min-height:550px;
            background:white;
            border-radius:25px;
            overflow:hidden;
            display:flex;
            box-shadow:0 20px 50px rgba(0,0,0,.25);
        }

        .brand-side{
            flex:1;
            background:linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            color:white;

            display:flex;
            flex-direction:column;
            justify-content:center;

            padding:60px;
        }

        .brand-side h1{
            font-size:55px;
            margin-bottom:15px;
            letter-spacing:2px;
        }

        .brand-side h2{
            font-size:30px;
            margin-bottom:20px;
        }

        .brand-side p{
            font-size:18px;
            line-height:1.8;
            opacity:.95;
        }

        .form-side{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#ffffff;
        }

        .login-box{
            width:80%;
            max-width:380px;
        }

        .login-box h2{
            text-align:center;
            color:#111827;
            font-size:32px;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#6b7280;
            margin-bottom:35px;
        }

        .login-box input{
            width:100%;
            padding:15px;
            margin-bottom:18px;
            border:1px solid #d1d5db;
            border-radius:12px;
            font-size:15px;
            transition:.3s;
        }

        .login-box input:focus{
            outline:none;
            border-color:#2563eb;
            box-shadow:0 0 10px rgba(37,99,235,.2);
        }

        .login-box button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .login-box button:hover{
            background:#1d4ed8;
        }

        .register-link{
            text-align:center;
            margin-top:25px;
            color:#6b7280;
        }

        .register-link a{
            color:#2563eb;
            text-decoration:none;
            font-weight:600;
        }

        .register-link a:hover{
            text-decoration:underline;
        }

        @media(max-width:900px){

            .login-container{
                flex-direction:column;
                width:100%;
            }

            .brand-side{
                padding:40px;
                text-align:center;
            }

            .brand-side h1{
                font-size:40px;
            }

            .brand-side h2{
                font-size:24px;
            }

            .form-side{
                padding:40px 0;
            }
        }

    </style>
</head>
<body>

<div class="login-container">

    <div class="brand-side">
        <h1>ESSEN</h1>
        <h2>Fashion Marketplace</h2>

        <p>
            Discover premium collections, trendy outfits,
            and a seamless shopping experience.
        </p>
    </div>

    <div class="form-side">

        <div class="login-box">

            <h2>Welcome Back</h2>

            <p class="subtitle">
                Sign in to continue shopping
            </p>

            <form method="POST">

                {% csrf_token %}

                <input
                    type="text"
                    name="username"
                    placeholder="Username">

                <input
                    type="password"
                    name="password"
                    placeholder="Password">

                <button type="submit">
                    Login
                </button>

            </form>

            <p class="register-link">
                Don't have an account?
                <a href="{% url 'register' %}">
                    Register
                </a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
